version: 2

models:
  - name: fct_player_match_stats
    description: "Aggregated stats for each player in each match."
    data_tests:
      # Composite Key Test
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - match_id
            - player_id
    columns:
      - name: match_id
        data_tests:
          - not_null
      - name: total_goals
        data_tests:
          # Replaced expression_is_true with accepted_range (min=0)
          - dbt_utils.accepted_range:
              min_value: 0
              # No max value needed for goals, effectively ">= 0"

  - name: fct_team_match_stats
    columns:
      - name: match_result
        data_tests:
          - accepted_values:
              values: ["Win", "Loss", "Draw"]
      - name: possession_pct
        data_tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
              # removed custom where clause to simplify
